name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    # ── Step 1: Fetch Google reviews (non-fatal) ──
    - name: Fetch Google reviews
      continue-on-error: true
      env:
        GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
      run: node scripts/fetch-google-reviews.mjs

    # ── Step 2: Vite build (must succeed) ──
    - name: Vite build
      run: npm run build

    # ── Step 3: Prerender with Puppeteer ──
    - name: Install Puppeteer system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libatk1.0-0 libatk-bridge2.0-0 libcups2 libxdamage1 libxkbcommon0 libpango-1.0-0 libcairo2 libasound2 libnspr4 libnss3 libgbm1 || true

    - name: Install Puppeteer browser
      run: npx puppeteer browsers install chrome

    - name: Prerender static HTML
      continue-on-error: true
      run: node scripts/prerender.mjs

    # ── Step 4: Fill gaps for any blog pages prerender missed ──
    - name: Generate fallback HTML for missing blog pages
      run: node scripts/generate-blog-fallbacks.mjs

    # ── Deploy ──
    - name: Create 404.html fallback for unknown URLs
      run: cp dist/index.html dist/404.html

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
