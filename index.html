        "text": "We finish most residential roof replacements in 1 to 3 days. The timeline depends on the size of the roof, how many layers we need to tear off, and whether we find rot or damage in the decking underneath. We plan around weather because Seattle gives us plenty of rain days, and we won't install when conditions compromise the seal. You'll know the schedule before we start, and we stick to it."
